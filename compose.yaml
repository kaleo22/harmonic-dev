services:
  ros2_jammy_sim:
    build:
      context: ./
      dockerfile: ./DockerFiles/Dockerfile
      args:
        - BASE_IMAGE=osrf/ros
        - BASE_TAG=jazzy-desktop-full
        - DISTRO=jazzy
        - WORKSPACE=docker_simulation_ws
        - USERNAME=ros
        - USER_UID=1000
        - USER_GID=1000

    container_name: ros2_jammy_simulator
    networks:
      - ros2_internal

    stdin_open: true
    tty: true

    environment:
      - ROS_DOMAIN_ID=0
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - GZ_VERSION=harmonic
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=:1
      - VNC_GEOMETRY=1920x1080
      - VNC_DEPTH=24
      - VNC_PASSWORD=change-me
      - VGL_DISPLAY=egl

    # GPU (Compose, nicht Swarm)
    gpus: all

    # DRM Rendernode für EGL/GBM in headless Setups
    devices:
      - /dev/dri:/dev/dri

    ports:
      - "5901:5901"

    volumes:
      - ~/.bash_history:/home/ros/.bash_history
      - ./docker_simulator:/home/ros/docker_simulation_ws

    group_add:
      - "render"
      - "video"
      - "lpadmin"

networks:
  ros2_internal:
    driver: bridge
